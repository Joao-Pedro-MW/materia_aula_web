<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="">
        <fieldset>
            <legend>Crie sua Conta</legend>
            <label for="inome">Nome:</label>
            <input type="text" id="inome" name="nome">
            <br><br>
            <label for="iemail">E-mail:</label>
            <input type="email" id="iemail" name="email" placeholder="usuario@example.com">
            <br><br>
            <label for="isenha">Senha:</label>
            <input type="password" id="isenha" name="senha" minlength="8" maxlength="30">
            <h2>Gênero</h2>
            <label for="imasculino">Masculino</label>
            <input type="radio" id="igenero" name="genero" value="masculino">
            <br>
            <label for="ifemino">Feminino</label>
            <input type="radio" id="igenero" name="genero" value="feminino">
            <br>
            <label for="ifemino">Outro</label>
            <input type="radio" id="igenero" name="genero" value="outro">
            
            <br><br>
            <h2>Biografia</h2>
            <label for="ibiografia">Faça sua biografia abaixo:</label>
            <br><br>
            <textarea type="" id="ibiografia" name="biografia" placeholder="Descreva sobra sua vida..." rows="10"></textarea>
            <br>
            <label for=""></label>
            <input type="text" id="">

            <br><br>
            <input type="checkbox" id="iconsentimento" value="true" name="consentimento" required>
            <label for="iconsentimento">Eu li e aceito os termos de serviço</label>
            <br><br>
            <input type="submit" id="iconfirmar" value="Confirmar">


        </fieldset>
    </form>
</body>

</html>
